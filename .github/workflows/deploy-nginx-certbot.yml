.github/workflows/deploy-nginx-certbot.yml
name: Deploy Nginx + Certbot + Docker

on:
  push:
    branches:
      - main
  workflow_dispatch: # Para ejecutar manualmente

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Install Nginx and Certbot
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          sudo apt update
          sudo apt install -y nginx certbot python3-certbot-nginx
          EOF

      - name: Generate SSL Certificate
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          sudo certbot certonly --nginx -d ${{ secrets.DOMAIN_NAME }} \
            --email ${{ secrets.EMAIL_CERTBOT }} \
            --agree-tos \
            --non-interactive \
            --keep-until-expiring
          EOF

      - name: Configure Nginx as Reverse Proxy
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          
          # Crear configuración de Nginx
          sudo tee /etc/nginx/sites-available/default > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name ${{ secrets.DOMAIN_NAME }};
              return 301 https://$server_name$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name ${{ secrets.DOMAIN_NAME }};

              ssl_certificate /etc/letsencrypt/live/${{ secrets.DOMAIN_NAME }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${{ secrets.DOMAIN_NAME }}/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;
              ssl_prefer_server_ciphers on;

              # Logs
              access_log /var/log/nginx/access.log;
              error_log /var/log/nginx/error.log;

              location / {
                  proxy_pass http://localhost:5000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection keep-alive;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          NGINX

          sudo systemctl enable nginx
          sudo systemctl restart nginx
          EOF

      - name: Setup Auto-renewal for SSL
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          # Certbot ya configura el auto-renewal con systemd timer
          sudo systemctl enable certbot.timer
          sudo systemctl start certbot.timer
          
          # Verificar que el timer está activo
          sudo systemctl status certbot.timer
          EOF

      - name: Verify Nginx Configuration
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          sudo nginx -t
          sudo systemctl status nginx
          EOF

      - name: Build and Deploy Docker
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd /home/${{ secrets.EC2_USER }}/MemoryOnlineBE || git clone https://github.com/JCASASB/MemoryOnlineBE.git
          cd /home/${{ secrets.EC2_USER }}/MemoryOnlineBE
          git pull origin main
          
          # Usar Podman en lugar de Docker
          podman-compose -f docker-compose.yml down || true
          podman-compose -f docker-compose.yml up -d --build
          EOF

      - name: Verify Services
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          echo "=== Nginx Status ==="
          sudo systemctl status nginx
          
          echo "=== Docker/Podman Status ==="
          podman ps
          
          echo "=== SSL Certificate ==="
          sudo certbot certificates
          EOF

      - name: Send Deployment Notification
        if: success()
        run: echo "✅ Deployment successful! Your app is available at https://${{ secrets.DOMAIN_NAME }}"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs above."

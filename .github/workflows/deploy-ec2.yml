name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: memory-online-be
  CONTAINER_NAME: memory-online-be

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Save Docker image as tar
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz

      - name: Debug - Check secrets are set
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is EMPTY"; else echo "EC2_HOST is set"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is EMPTY"; else echo "EC2_USER is set"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY is EMPTY"; else echo "EC2_SSH_KEY is set (length: ${#EC2_KEY})"; fi
        env:
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "image.tar.gz"
          target: "/home/${{ secrets.EC2_USER }}"

      - name: Install Docker and Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Docker not found, installing..."
              sudo yum update -y 2>/dev/null || sudo apt-get update -y
              sudo yum install -y docker 2>/dev/null || sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
              echo "Docker installed successfully"
            fi

            # Use sudo for docker commands in case group change hasn't taken effect
            sudo docker load -i /home/${{ secrets.EC2_USER }}/image.tar.gz

            # Stop and remove existing container if running
            sudo docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            sudo docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Run new container
            sudo docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 5000:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8080 \
              -e AllowedCorsOrigins__0=${{ secrets.FRONTEND_URL }} \
              ${{ env.IMAGE_NAME }}:latest

            # Clean up tar file and dangling images
            rm -f /home/${{ secrets.EC2_USER }}/image.tar.gz
            sudo docker image prune -f
